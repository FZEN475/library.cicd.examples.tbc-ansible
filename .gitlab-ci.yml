
include:
  - local: '.gitlab-ci.ansible-example.yml'
  - component: $CI_SERVER_FQDN/library/cicd/auto-gitlab/auto-release@main
  
stages:
  - build           # ansible-lint-review, ansible-lint-integration, ansible-lint-staging, ansible-lint-production
  - test            # ansible-checkov
  - package-build   # Нет job
  - package-test    # Нет job
  - infra           # Нет job
  - deploy          # ansible-review, ansible-integration, ansible-staging,
  # ansible-cleanup-review, ansible-cleanup-integration, ansible-cleanup-staging
  - acceptance      # Нет job
  - publish         # Нет job
  - infra-prod      # Нет job
  - production      # ansible-production
  - auto-gitlab
  
variables:
  CI_DEBUG_TRACE: "false"

  TARGET_USER: "ubuntu"
  TARGET_HOST: "workflow01"
  SSH_KNOWN_HOSTS: "workflow01 ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIEAD9aW6IjJLUmsNTwxIAnO3hWSsVpOAPqbZXI1bLhZ7"
  
# auto-gitlab/auto-release

.auto-gitlab:auto-core:public:needs:
  - job: tf-review
    optional: true
  - job: tf-integration
    optional: true
  - job: tf-staging
    optional: true
  - job: tf-production
    optional: true
  - job: tf-publish-module
    optional: true

.auto-gitlab:auto-release:public:RELEASE-md:
  - |
    cat > RELEASE.md <<EOF
    ### Release ${CI_COMMIT_TAG}
    * [🚀 **Релиз**](${CI_PROJECT_URL}/-/releases/permalink/latest)  
    * [**Релиз** Зеркало](https://github.com/FZEN475/library.cicd.examples.tbc-ansible.git)  
    * [**Релиз** Зеркало (tag)](https://github.com/FZEN475/library.cicd.examples.tbc-ansible/tree/${CI_COMMIT_TAG})

    ---
      
    EOF